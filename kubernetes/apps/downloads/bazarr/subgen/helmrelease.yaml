---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ${APP}
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: mccloud/subgen
              tag: 2026.04.3-cpu@sha256:153984207dd5c4856c25c79f2c7bf26393340b67b9c091a0b640367106c796cc
            env:
              TZ: "${TIMEZONE}"

              TRANSCRIBE_DEVICE: cpu
              WHISPER_MODEL: distil-large-v3.5
              CONCURRENT_TRANSCRIPTIONS: 1
              WHISPER_THREADS: 40
              COMPUTE_TYPE: int8
              CLEAR_VRAM_ON_COMPLETE: true
              SUBGEN_KWARGS: '{"temperature": 0, "beam_size": 5, "no_speech_threshold": 0.8, "condition_on_previous_text": false, "suppress_blank": true, "vad_filter": true, "vad_parameters": {"min_silence_duration_ms": 500}}'

              PROCESS_ADDED_MEDIA: true
              PROCESS_MEDIA_ON_PLAY: true
              PLEX_QUEUE_NEXT_EPISODE: true
              PLEX_QUEUE_SEASON: true
              PLEX_QUEUE_SERIES: true

              SKIP_IF_TARGET_SUBTITLES_EXIST: false
              SKIP_IF_INTERNAL_SUBTITLES_LANGUAGE: ""

              APPEND: true

              WEBHOOK_PORT: &port 9000
              PUID: 568
              PGID: 568
              DEBUG: true
              UPDATE: true
              MODEL_PATH: /models

              PLEX_SERVER: http://${PLEX_IP}:32400

            envFrom:
              - secretRef:
                  name: *app

            resources:
              requests:
                cpu: 4000m
                memory: 4Gi
              limits:
                memory: 64Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https

    persistence:
      models:
        type: emptyDir
      media:
        type: nfs
        server: ${NAS_IP}
        path: ${NAS_PATH}/data
        globalMounts:
          - path: /mnt/data
