---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ${APP}
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: mccloud/subgen
              tag: 2026.04.1-cpu@sha256:82bb39371acc8e5befe51901278260863b5174fc223c502e2a5ace769eebcb06
            env:
              TZ: "${TIMEZONE}"
              TRANSCRIBE_DEVICE: cpu
              WHISPER_MODEL: small.en
              CONCURRENT_TRANSCRIPTIONS: 1
              WHISPER_THREADS: 4
              PROCADDEDMEDIA: false
              PROCMEDIAONPLAY: false
              NAMESUBLANG: en
              SKIPIFINTERNALSUBLANG: eng
              WORD_LEVEL_HIGHLIGHT: false
              WEBHOOKPORT: &port 9000
              COMPUTE_TYPE: int8
              DEBUG: true
              FORCE_DETECTED_LANGUAGE_TO: 'en'
              CLEAR_VRAM_ON_COMPLETE: true
              SKIPIFEXTERNALSUB: true
              SKIP_IF_TO_TRANSCRIBE_SUB_ALREADY_EXIST:  true

            resources:
              requests:
                cpu: 4000m
                memory: 4Gi
              limits:
                memory: 12Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
