---
groups:
  - name: radarr-4k
    rules:
      - alert: Radarr4KDatabaseIsLocked
        expr: |
          sum by (app) (count_over_time({app=~"radarr-4k"} |~ "(?i)database is locked"[5m])) > 0
        for: 5m
        annotations:
          summary: >-
            {{ $labels.app }} is experiencing database issues
        labels:
          severity: critical

      - alert: Radarr4KDatabaseIsMalformed
        expr: |
          sum by (app) (count_over_time({app=~"radarr-4k"} |~ "(?i)database disk image is malformed"[5m])) > 0
        for: 5m
        annotations:
          summary: >-
            {{ $labels.app }} is experiencing database issues
        labels:
          severity: critical