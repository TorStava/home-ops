---
# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
sonarr:
  sonarr:
    base_url: http://sonarr.downloads.svc.cluster.local
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    media_management:
      propers_and_repacks: do_not_prefer
    quality_definition:
      type: series
    quality_profiles:
      - trash_id: 9d142234e45d6143785ac55f5a9e8dc9  # WEB-1080p (Alternative)
        reset_unmatched_scores:
          enabled: true
    custom_format_groups:
      add:
        - trash_id: d920fd959d220306888f40b6f38e1578  # [Optional] Season Packs
    media_naming:
      series: plex-tvdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

radarr:
  radarr:
    base_url: http://radarr.downloads.svc.cluster.local
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true
    media_management:
      propers_and_repacks: do_not_prefer
    quality_definition:
      type: movie
    quality_profiles:
      - trash_id: d1d67249d3890e49bc12e275d989a7e9  # HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
    media_naming:
      folder: default
      movie:
        rename: true
        standard: plex-tmdb

  radarr-4k:
    base_url: http://radarr-4k.downloads.svc.cluster.local
    api_key: !env_var RADARR_4K_API_KEY
    delete_old_custom_formats: true
    media_management:
      propers_and_repacks: do_not_prefer
    quality_definition:
      type: movie
    quality_profiles:
      - trash_id: fd161a61e3ab826d3a22d53f935696dd  # Remux + WEB 2160p
        reset_unmatched_scores:
          enabled: true
    media_naming:
      folder: default
      movie:
        rename: true
        standard: plex-tmdb
