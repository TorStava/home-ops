---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      alloy:
        type: daemonset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/grafana/alloy
              tag: v1.8.2
            args:
              - run
              - /etc/alloy/config.alloy
              - --storage.path=/tmp/alloy
              - --server.http.listen-addr=0.0.0.0:12346
            ports:
              - containerPort: 12345
                name: talos-logs
                protocol: TCP
              - containerPort: 12346
                name: http-metrics
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /-/healthy
                    port: http-metrics
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /-/ready
                    port: http-metrics
                  initialDelaySeconds: 10
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
    serviceAccount:
      alloy: {}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 473
        runAsGroup: 473
        fsGroup: 473
    service:
      app:
        ports:
          http-metrics:
            port: 12346
    persistence:
      config:
        type: configMap
        name: alloy-config
        advancedMounts:
          alloy:
            app:
              - path: /etc/alloy
                readOnly: true
