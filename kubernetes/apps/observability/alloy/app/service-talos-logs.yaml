---
# Talos machine.logging ships JSON lines to this LoadBalancer (node LAN IP).
apiVersion: v1
kind: Service
metadata:
  name: alloy-talos-logs
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/component: talos-logs
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.5
  externalTrafficPolicy: Cluster
  ports:
    - name: talos-logs
      port: 12345
      targetPort: 12345
      protocol: TCP
  selector:
    app.kubernetes.io/name: alloy
