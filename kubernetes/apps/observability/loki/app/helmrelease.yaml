---
# yaml-language-server: $schema=https://schemas.tholinka.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: loki
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deploymentMode: SingleBinary
    fullnameOverride: loki
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      limits_config:
        retention_period: 720h
        max_query_series: 100000
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: openebs-zfs-128k
        size: 50Gi
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    gateway:
      enabled: false
    test:
      enabled: false
    lokiCanary:
      enabled: false
    monitoring:
      serviceMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
