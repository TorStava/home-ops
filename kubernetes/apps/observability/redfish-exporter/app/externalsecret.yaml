---
# Bitwarden Secrets Manager item: ilo-redfish
# Fields: REDFISH_USERNAME, REDFISH_PASSWORD, REDFISH_HOST (iLO IP or hostname, no https://)
#
# iLO account: ReadOnly (or Operator) is sufficient — exporter only performs Redfish GETs.
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redfish-exporter
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: redfish-exporter-config
    template:
      data:
        REDFISH_HOST: "{{ .REDFISH_HOST }}"
        config.yml: |
          loglevel: info
          hosts:
            default:
              username: "{{ .REDFISH_USERNAME }}"
              password: "{{ .REDFISH_PASSWORD }}"
            {{ .REDFISH_HOST }}:
              username: "{{ .REDFISH_USERNAME }}"
              password: "{{ .REDFISH_PASSWORD }}"
  dataFrom:
    - extract:
        key: ilo-redfish
