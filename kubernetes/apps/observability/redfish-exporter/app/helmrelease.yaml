---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redfish-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: redfish-exporter-config
      valuesKey: REDFISH_HOST
      targetPath: defaultPodOptions.labels.redfish\.io/target
  values:
    controllers:
      redfish-exporter:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              # Upstream jenningsloy318/redfish_exporter has no Docker Hub image; mattgoble builds 0.11.0 from that project.
              repository: docker.io/mattgoble/redfish_exporter
              tag: 0.11.0@sha256:dda1dd1ccef4e765a5c244ed11d7d05e87b6cfeff232a4f497a34ab562343be0
            command:
              - /usr/local/bin/redfish_exporter
            args:
              - --config.file=/config/config.yml
            ports:
              - containerPort: 9610
                name: http
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 9610
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 9610
                  initialDelaySeconds: 10
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
    defaultPodOptions:
      # iLO/BMC is often on a management VLAN reachable from the node, not the pod overlay (Cilium).
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
    service:
      app:
        ports:
          # Port key must not be "metrics" — app-template rewrites probe ports to the service port name.
          http:
            port: 9610
    persistence:
      config:
        type: secret
        name: redfish-exporter-config
        advancedMounts:
          redfish-exporter:
            app:
              - path: /config
                readOnly: true
