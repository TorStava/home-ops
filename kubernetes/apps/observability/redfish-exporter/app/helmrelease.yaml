---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redfish-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      redfish-exporter:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              # Upstream jenningsloy318/redfish_exporter has no Docker Hub image; mattgoble builds 0.11.0 from that project.
              repository: docker.io/mattgoble/redfish_exporter
              tag: 1.0.2@sha256:9dff4562faf3517da776fe6655395f86e2f25b61dfd46e9aba03e8cafbce3529
            command:
              - /usr/local/bin/redfish_exporter
            args:
              - --config.file=/config/config.yml
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: metrics
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: metrics
                  initialDelaySeconds: 10
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
    service:
      app:
        ports:
          metrics:
            port: 9610
    persistence:
      config:
        type: secret
        name: redfish-exporter-config
        advancedMounts:
          redfish-exporter:
            app:
              - path: /config
                readOnly: true
