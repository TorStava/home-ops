---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app affine
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17
            envFrom:
              - secretRef:
                  name: *app
              - secretRef:
                  name: affine-initdb
          migration:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.26.5@sha256:f71846be9d22c93fa8528c122208b9e24cbf013513b67a02f41f5939466c8a99
            command: ["sh", "-c", "node ./scripts/self-host-predeploy.js"]
            env:
              REDIS_SERVER_HOST: dragonfly-cluster.database.svc.cluster.local
              REDIS_SERVER_PORT: "6379"
              AFFINE_INDEXER_ENABLED: "false"
            envFrom:
              - secretRef:
                  name: *app
        containers:
          app:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.26.5@sha256:f71846be9d22c93fa8528c122208b9e24cbf013513b67a02f41f5939466c8a99
            env:
              AFFINE_SERVER_HOST: affine.${SECRET_DOMAIN}
              AFFINE_SERVER_HTTPS: "true"
              AFFINE_SERVER_PORT: &port 3010
              REDIS_SERVER_HOST: dragonfly-cluster.database.svc.cluster.local
              REDIS_SERVER_PORT: "6379"
              AFFINE_INDEXER_ENABLED: "false"
              NODE_OPTIONS: "--import=./scripts/register.js"
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: AFFiNE
          gethomepage.dev/icon: affine.png
          gethomepage.dev/app: *app

    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          *app :
            app:
              - path: /root/.affine/storage
                subPath: storage
              - path: /root/.affine/config
                subPath: config
            migration:
              - path: /root/.affine/storage
                subPath: storage
              - path: /root/.affine/config
                subPath: config
