---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app browserless
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }
        containers:
          browserless:
            image:
              repository: ghcr.io/browserless/chromium
              tag: v2.42.0@sha256:71ae7fa09bd1bf78efaa2803d75c837ab5a56e0d7637695bff3077d87248e642
              pullPolicy: IfNotPresent
            env:
              TZ: "${TIMEZONE}"
              DEBUG: "browserless*,-*:trace,-*:verbose"
              ENABLE_DEBUGGER: "false"
              TOKEN:
                secretKeyRef:
                  name: browserless
                  key: BROWSERLESS_TOKEN
              TIMEOUT: "60000"
            securityContext:
              runAsUser: 999
              runAsGroup: 999
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    persistence:
      tmp:
        type: emptyDir

    service:
      app:
        controller: *app
        ports:
          http:
            port: 80
            targetPort: 3000
