---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app docmost
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            env:
              INIT_POSTGRES_DBNAME: *app
              INIT_POSTGRES_HOST: postgres-cluster-rw.database.svc.cluster.local
              INIT_POSTGRES_USER: *app
            envFrom:
              - secretRef:
                  name: docmost-initdb
        containers:
          app:
            image:
              repository: docmost/docmost
              tag: 0.24.1@sha256:ae9a964d58fe45071b2d87afe44ec1b0fb74a6e0124e831e906fce96b0258a84
            env:
              PORT: &port 3000
              APP_URL: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
              REDIS_URL: redis://dragonfly-cluster.database.svc.cluster.local:6379
              STORAGE_DRIVER: local
              DISABLE_TELEMETRY: "true"
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness: &docmostProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *docmostProbes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 5
                  timeoutSeconds: 3
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: Docmost
          gethomepage.dev/icon: mdi-text-box-multiple-outline
          gethomepage.dev/app: *app
    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          *app :
            app:
              - path: /app/data/storage
