---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app freshrss
spec:
  timeout: 15m
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: freshrss/freshrss
              tag: 1.29.1-alpine
            env:
              CRON_MIN: "*"
              DOMAIN: freshrss.${SECRET_DOMAIN}
              LISTEN: &port 8080
    service:
      main:
        controller: *app
        ports:
          http:
            port: &port 5006
    route:
      *app :
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: HOME
          gethomepage.dev/name: FreshRSS
          gethomepage.dev/description: Personal news reader
          gethomepage.dev/icon: freshrss.svg
          gethomepage.dev/app: *app

    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          *app :
            main:
              - path: /var/www/FreshRSS/data
                subPath: data
                readOnly: false
              - path: /var/www/FreshRSS/extensions
                subPath: extensions
                readOnly: false
      tmpfs:
        type: emptyDir
        advancedMounts:
          *app :
            main:
              - path: /var/www/FreshRSS/data/cache
                subPath: cache