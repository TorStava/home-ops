---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app freshrss
spec:
  timeout: 15m
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17
            env:
              INIT_POSTGRES_DBNAME: *app
              INIT_POSTGRES_HOST: postgres-cluster-rw.database.svc.cluster.local
              INIT_POSTGRES_USER: *app
            envFrom:
              - secretRef:
                  name: freshrss-initdb
        containers:
          main:
            image:
              repository: freshrss/freshrss
              tag: 1.29.1  # Debian variant: bundles mod_auth_openidc (alpine does not)
            env:
              CRON_MIN: "*"
              TZ: ${TIMEZONE}
              DOMAIN: freshrss.${SECRET_DOMAIN}
              LISTEN: &port 8080
              FRESHRSS_INSTALL: |-
                --api-enabled
                --base-url https://freshrss.${SECRET_DOMAIN}
                --default-user tor
                --auth-type http_auth
                --language en
                --db-type pgsql
                --db-host postgres-cluster-rw.database.svc.cluster.local
                --db-base freshrss
                --db-user freshrss
                --db-password $${DB_PASSWORD}
              FRESHRSS_USER: |-
                --user tor
                --password $${ADMIN_PASSWORD}
                --api-password $${ADMIN_API_PASSWORD}
              # OIDC / Authentik (mod_auth_openidc)
              OIDC_ENABLED: "1"
              OIDC_PROVIDER_METADATA_URL: https://auth.${SECRET_DOMAIN}/application/o/freshrss/.well-known/openid-configuration
              OIDC_REMOTE_USER_CLAIM: preferred_username
              OIDC_SCOPES: openid profile email
              OIDC_X_FORWARDED_HEADERS: X-Forwarded-Host X-Forwarded-Port X-Forwarded-Proto
            envFrom:
              - secretRef:
                  name: *app
    service:
      main:
        controller: *app
        ports:
          http:
            port: *port
    route:
      *app :
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: Home
          gethomepage.dev/name: FreshRSS
          gethomepage.dev/description: Personal news reader
          gethomepage.dev/icon: freshrss.svg
          gethomepage.dev/app: *app

    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          *app :
            main:
              - path: /var/www/FreshRSS/data
                subPath: data
                readOnly: false
              - path: /var/www/FreshRSS/extensions
                subPath: extensions
                readOnly: false
      tmpfs:
        type: emptyDir
        advancedMounts:
          *app :
            main:
              - path: /var/www/FreshRSS/data/cache
                subPath: cache