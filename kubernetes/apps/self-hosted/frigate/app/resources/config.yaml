---
# yaml-language-server: $schema=http://192.168.1.249:5000/api/config/schema.json
version: "0.17-0"

logger:
  default: info

mqtt:
  client_id: frigate
  host: "{FRIGATE_MQTT_HOST}"
  topic_prefix: frigate
  user: "{FRIGATE_MQTT_USERNAME}"
  password: "{FRIGATE_MQTT_PASSWORD}"

database:
  path: /data/frigate.db

birdseye:
  mode: continuous

# Use both Corals for detection; they share a common queue (load-balanced).
# detectors:
  # coral1:
  #   type: edgetpu
  #   device: pci:0
  # coral2:
  #   type: edgetpu
  #   device: pci:1

semantic_search:
  enabled: true
  model_size: small
  reindex: false       # one-time, then set back to false


# Default detection model is Edge TPU–compatible (SSD MobileNet). No need to set model.path for Coral.
model:
  # https://docs.frigate.video/configuration/objects
  labelmap:
    2: vehicle   # car
    3: vehicle   # motorcycle
    7: vehicle   # truck
    15: animal   # bird
    16: animal   # cat
    17: animal   # dog
    18: animal   # horse
    19: animal   # sheep
    20: animal   # cow
    26: package  # backpack
    30: package  # handbag
    32: package  # suitcase

ffmpeg:
  global_args: ["-hide_banner", "-loglevel", "warning"]
  # hwaccel_args: preset-intel-qsv-h264

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 2

record:
  enabled: true
  continuous:
    days: 30
  motion:
    days: 90
  alerts:
    retain:
      days: 120
  detections:
    retain:
      days: 120

objects:
  track:
    - person
    - vehicle
    - animal
    - package
  filters:
    person:
      min_area: 1500
      threshold: 0.7

audio:
  enabled: true
  listen:
    - alarm
    - ambulance
    - bang
    - break
    - breaking
    - emergency_vehicle
    - fire_alarm
    - glass
    - knock
    - police_car
    - scream
    - siren
    - smash
    - speech
    - yell

go2rtc:
  streams:
    garage_main: rtsp://{FRIGATE_GARAGE_CAMERA_USERNAME}:{FRIGATE_GARAGE_CAMERA_PASSWORD}@192.168.1.180:554/cam/realmonitor?channel=1&subtype=0
    garage_sub: rtsp://{FRIGATE_GARAGE_CAMERA_USERNAME}:{FRIGATE_GARAGE_CAMERA_PASSWORD}@192.168.1.180:554/cam/realmonitor?channel=1&subtype=1
    # VSTARCAM office cameras (.144, .157): use /tcp/ paths so go2rtc sees proper SPS/resolution
    # office_cam_main: rtsp://{FRIGATE_CAMERA_USERNAME}:{FRIGATE_CAMERA_PASSWORD}@192.168.1.144:10554/tcp/av0_0
    # office_cam_sub: rtsp://{FRIGATE_CAMERA_USERNAME}:{FRIGATE_CAMERA_PASSWORD}@192.168.1.144:10554/tcp/av0_1
    # office_window_cam_main: rtsp://{FRIGATE_CAMERA_USERNAME}:{FRIGATE_CAMERA_PASSWORD}@192.168.1.157:10554/tcp/av0_0
    # office_window_cam_sub: rtsp://{FRIGATE_CAMERA_USERNAME}:{FRIGATE_CAMERA_PASSWORD}@192.168.1.157:10554/tcp/av0_1

detect:
  enabled: true

cameras:
  garage:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://localhost:8554/garage_main
          roles:
            - record
            - audio
        - path: rtsp://localhost:8554/garage_sub
          roles:
            - detect
    detect:
      width: 640
      height: 360
      fps: 5
    objects:
      track:
        - person
        - vehicle
        - animal
        - package
    motion:
      mask:
        - 0.743,0.051,0.981,0.051,0.983,0.099,0.741,0.098  # Timestamp
    live:
      streams:
        Main: garage_main
        Sub: garage_sub

  # office_cam:
  #   enabled: true
  #   ffmpeg:
  #     inputs:
  #       - path: rtsp://localhost:8554/office_cam_main
  #         roles:
  #           - record
  #           - audio
  #       - path: rtsp://localhost:8554/office_cam_sub
  #         roles:
  #           - detect
  #     output_args:
  #       record: preset-record-generic-audio-aac
  #   detect:
  #     width: 640
  #     height: 360
  #     fps: 5
  #   objects:
  #     track:
  #       - person
  #       - animal
  #   live:
  #     streams:
  #       Main: office_cam_main
  #       Sub: office_cam_sub

  # office_window_cam:
  #   enabled: true
  #   ffmpeg:
  #     inputs:
  #       - path: rtsp://localhost:8554/office_window_cam_main
  #         roles:
  #           - record
  #           - audio
  #       - path: rtsp://localhost:8554/office_window_cam_sub
  #         roles:
  #           - detect
  #     output_args:
  #       record: preset-record-generic-audio-aac
  #   detect:
  #     width: 640
  #     height: 360
  #     fps: 5
  #   objects:
  #     track:
  #       - person
  #       - animal
  #       - vehicle
  #   live:
  #     streams:
  #       Main: office_window_cam_main
  #       Sub: office_window_cam_sub

auth:
  enabled: false

proxy:
  header_map:
    user: remote-user
  # With auth.enabled: false, anonymous users default to 'viewer' role in 0.17.
  # Grant admin for LAN-only deployment so the UI shows all controls.
  default_role: admin

tls:
  enabled: false
