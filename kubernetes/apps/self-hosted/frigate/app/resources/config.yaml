---
# yaml-language-server: $schema=http://192.168.1.249:5000/api/config/schema.json
logger:
  default: info

mqtt:
  client_id: frigate
  host: "{FRIGATE_MQTT_HOST}"
  topic_prefix: frigate
  user: "{FRIGATE_MQTT_USERNAME}"
  password: "{FRIGATE_MQTT_PASSWORD}"

database:
  path: /data/frigate.db

birdseye:
  enabled: true

# Use both Corals for detection; they share a common queue (load-balanced). CPU detector omitted so all inference runs on TPU.
detectors:
  coral1:
    type: edgetpu
    device: pci:0
  coral2:
    type: edgetpu
    device: pci:1

semantic_search:
  enabled: true
  reindex: false
  model_size: large


# Default detection model is Edge TPU–compatible (SSD MobileNet). No need to set model.path for Coral.
model:
  # https://docs.frigate.video/configuration/objects
  labelmap:
    2: vehicle # car
    3: vehicle # motorcycle
    4: vehicle # airplane
    5: vehicle # bus
    6: vehicle # train
    7: vehicle # car
    8: vehicle # boat
    15: animal # bird
    16: animal # cat
    17: animal # dog
    18: animal # horse
    19: animal # sheep
    20: animal # cow
    21: animal # elephant
    22: animal # bear
    23: animal # zebra
    24: animal # giraffe
    26: package # backpack
    30: package # handbag
    32: package # suitcase

ffmpeg:
  global_args: ["-hide_banner", "-loglevel", "warning"]
  # hwaccel_args: preset-intel-qsv-h264

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 2

record:
  enabled: true
  # Top-level retain removed in current schema; use continuous for "all" video retention
  continuous:
    days: 14
  alerts:
    retain:
      days: 90
      mode: active_objects
  detections:
    retain:
      days: 90
      mode: active_objects

objects:
  track:
    - person
    - vehicle
    - animal
    # - bike  # not supported by default model
    - package
  filters:
    person:
      min_area: 5000
      max_area: 100000
      threshold: 0.7

audio:
  enabled: true
  listen:
    - alarm
    - ambulance
    - bang
    - break
    - breaking
    - emergency_vehicle
    - fire_alarm
    - glass
    - knock
    - noise
    - police_car
    - scream
    - siren
    - smash
    - speech
    - tap
    - yell

go2rtc:
  streams:
    garage_hd: rtsp://{FRIGATE_GARAGE_CAMERA_USERNAME}:{FRIGATE_GARAGE_CAMERA_PASSWORD}@192.168.1.180:554/cam/realmonitor?channel=1&subtype=0
    garage_sd: rtsp://{FRIGATE_GARAGE_CAMERA_USERNAME}:{FRIGATE_GARAGE_CAMERA_PASSWORD}@192.168.1.180:554/cam/realmonitor?channel=1&subtype=1
    # Office cameras (.144, .157): skipped here; Frigate connects directly to cameras (see cameras.*.ffmpeg.inputs) for stability

cameras:
  garage:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://localhost:8554/garage_hd
          roles:
            - record
            - audio
        - path: rtsp://localhost:8554/garage_sd
          roles:
            - detect
    motion:
      mask:
        - 0.025,0.039,0.263,0.039,0.265,0.087,0.023,0.086
    live:
      streams:
        Main: garage_hd
        Sub: garage_sd

  office_cam:
    enabled: true
    ffmpeg:
      # VSTARCAM: use /tcp/ path (not /udp/) so camera sends stream with proper SPS/resolution
      inputs:
        - path: rtsp://{FRIGATE_CAMERA_USERNAME}:{FRIGATE_CAMERA_PASSWORD}@192.168.1.144:10554/tcp/av0_0
          input_args:
            - -rtsp_transport
            - tcp
            - -analyzeduration
            - "1000M"
            - -probesize
            - "1000M"
          roles:
            - record
            - audio
        - path: rtsp://{FRIGATE_CAMERA_USERNAME}:{FRIGATE_CAMERA_PASSWORD}@192.168.1.144:10554/tcp/av0_1
          input_args:
            - -rtsp_transport
            - tcp
            - -analyzeduration
            - "1000M"
            - -probesize
            - "1000M"
          roles:
            - detect
      output_args:
        record: preset-record-generic-audio-aac
    detect:
      width: 640
      height: 360
      fps: 5
    objects:
      track:
        - person
        - animal
    # No go2rtc stream; live view uses jsmpeg (detect stream)

  office_window_cam:
    enabled: true
    ffmpeg:
      # VSTARCAM: use /tcp/ path (not /udp/) so camera sends stream with proper SPS/resolution
      inputs:
        - path: rtsp://{FRIGATE_CAMERA_USERNAME}:{FRIGATE_CAMERA_PASSWORD}@192.168.1.157:10554/tcp/av0_0
          input_args:
            - -rtsp_transport
            - tcp
            - -analyzeduration
            - "1000M"
            - -probesize
            - "1000M"
          roles:
            - record
            - audio
        - path: rtsp://{FRIGATE_CAMERA_USERNAME}:{FRIGATE_CAMERA_PASSWORD}@192.168.1.157:10554/tcp/av0_1
          input_args:
            - -rtsp_transport
            - tcp
            - -analyzeduration
            - "1000M"
            - -probesize
            - "1000M"
          roles:
            - detect
      output_args:
        record: preset-record-generic-audio-aac
    detect:
      width: 640
      height: 360
      fps: 5
    objects:
      track:
        - person
        - animal
        - vehicle
    # No go2rtc stream; live view uses jsmpeg (detect stream)

auth:
  enabled: false

proxy:
  header_map:
    user: remote-user

tls:
  enabled: false
