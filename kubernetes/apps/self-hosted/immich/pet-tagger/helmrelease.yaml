---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-pet-tagger
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      immich-pet-tagger:
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: ghcr.io/tedornitier/immich-pet-tagger
              tag: cpu
            env:
              IMMICH_URL: http://immich-server.self-hosted.svc.cluster.local:2283
              IMMICH_EXTERNAL_URL: https://photos.${SECRET_DOMAIN}
              IMMICH_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: immich-pet-tagger
                    key: IMMICH_API_KEY
              POLL_INTERVAL: "300"
              GPU_WORKERS: "1"
              YOLO_INPUT_SIZE: "640"
              THRESHOLD: "0.8"

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: immich-pet-tagger
        globalMounts:
          - path: /data
      model-cache:
        type: emptyDir
        globalMounts:
          - path: /root/.cache
