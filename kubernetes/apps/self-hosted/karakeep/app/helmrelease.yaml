---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app karakeep
spec:
  timeout: 15m
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          *app :
            image:
              repository: ghcr.io/karakeep-app/karakeep
              tag: 0.32.0@sha256:64d6a9bbf2d37b5c808cf06b5d87f1f1c7846fdd3844724145a9741aeb06fd31
            env:
              BROWSER_WEB_URL: http://karakeep-chrome.self-hosted.svc.cluster.local:9222
              CRAWLER_DOWNLOAD_BANNER_IMAGE: "true"
              CRAWLER_ENABLE_ADBLOCKER: "true"
              CRAWLER_STORE_SCREENSHOT: "true"
              DATA_DIR: /data
              DISABLE_SIGNUPS: "true"
              DISABLE_PASSWORD_AUTH: "true"
              MEILI_ADDR: http://karakeep-meilisearch.self-hosted.svc.cluster.local:7700
              NEXTAUTH_URL: https://karakeep.${SECRET_DOMAIN}
              OAUTH_PROVIDER_NAME: authentik
              OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: "true"
              OAUTH_AUTO_REDIRECT: "true"
              DISABLE_NEW_RELEASE_CHECK: "true"
              COREPACK_INTEGRITY_KEYS: "0"
            envFrom:
              - secretRef:
                  name: *app
      chrome:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: gcr.io/zenika-hub/alpine-chrome
              tag: 124@sha256:1a0046448e0bb6c275c88f86e01faf0de62b02ec8572901256ada0a8c08be23f
            command:
              - chromium-browser
            args:
              - --headless
              - --no-sandbox
              - --disable-gpu
              - --disable-dev-shm-usage
              - --remote-debugging-address=0.0.0.0
              - --remote-debugging-port=9222
              - --hide-scrollbars
            securityContext:
              capabilities:
                drop:
                  - ALL
      meilisearch:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/getmeili/meilisearch
              tag: v1.46.1@sha256:cbe0e500a5fc04397dfe0245cf143fee40658b26470daaf549f0a6927c5c08dc
            args:
              - /bin/meilisearch
              - --experimental-dumpless-upgrade
            env:
              MEILI_NO_ANALYTICS: true
            envFrom:
              - secretRef:
                  name: *app
      fivefilters:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
        containers:
          app:
            image:
              repository: docker.io/heussd/fivefilters-full-text-rss
              tag: 3.8.1@sha256:5b0a168c6b4019df68ea5b00490612edfe836fc5d1e0b95fa5db4a293192d85c
            env:
              FTR_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: FTR_ADMIN_PASSWORD
    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          *app :
            karakeep:
              - path: /data
                subPath: karakeep
          meilisearch:
            app:
              - path: /meili_data
                subPath: meilisearch
      fivefilters-cache:
        type: emptyDir
        advancedMounts:
          fivefilters:
            app:
              - path: /var/www/html/cache/rss
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: KaraKeep
          gethomepage.dev/description: KaraKeep is a self-hosted knowledge management platform that allows you to organize and store your knowledge in a structured and efficient way.
          gethomepage.dev/icon: karakeep.png
          gethomepage.dev/app: *app
        rules:
          - backendRefs:
              - identifier: app
                port: http
      fivefilters:
        hostnames:
          - "fivefilters.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: Full-Text RSS
          gethomepage.dev/description: FiveFilters Full-Text RSS extracts full article content and converts summary feeds into full-text feeds.
          gethomepage.dev/icon: mdi-rss
        rules:
          - backendRefs:
              - identifier: fivefilters
                port: http
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000
        primary: true
      chrome:
        controller: chrome
        ports:
          http:
            port: 9222
      meilisearch:
        controller: meilisearch
        ports:
          http:
            port: 7700
      fivefilters:
        controller: fivefilters
        ports:
          http:
            port: 80