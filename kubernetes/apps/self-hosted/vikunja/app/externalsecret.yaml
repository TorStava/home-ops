---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app "${APP}"
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: *app
    creationPolicy: Owner
    template:
      data:
        INIT_POSTGRES_DBNAME: *app
        INIT_POSTGRES_HOST: postgres-cluster-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: *app
        INIT_POSTGRES_PASS: &dbpass "{{ .DB_PASSWORD }}"
        VIKUNJA_DATABASE_PASSWORD: *dbpass
        VIKUNJA_SERVICE_JWTSECRET: "{{ .JWT_SECRET }}"
        VIKUNJA_AUTH_OPENID_ENABLED: "true"
        VIKUNJA_AUTH_OPENID_PROVIDERS: '[{"name":"Authentik","authurl":"https://auth.${SECRET_DOMAIN}/application/o/vikunja/","clientid":"{{ .OAUTH_CLIENT_ID }}","clientsecret":"{{ .OAUTH_CLIENT_SECRET }}"}]'
  dataFrom:
    - extract:
        key: *app
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secret vikunja-initdb
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: *secret
    creationPolicy: Owner
    template:
      data:
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative_pg
