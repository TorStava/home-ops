---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app "${APP}"
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: *app
    creationPolicy: Owner
    template:
      data:
        INIT_POSTGRES_DBNAME: *app
        INIT_POSTGRES_HOST: postgres-cluster-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: *app
        INIT_POSTGRES_PASS: &dbpass "{{ .DB_PASSWORD }}"
        VIKUNJA_DATABASE_PASSWORD: *dbpass
        VIKUNJA_SERVICE_JWTSECRET: "{{ .JWT_SECRET }}"
        VIKUNJA_AUTH_OPENID_ENABLED: "true"
        # Do not set VIKUNJA_AUTH_OPENID_PROVIDERS to a JSON blob — vikunja's setConfigFromEnv() assigns that key a
        # string, which is not a map (pkg/config/config.go). Use nested env vars so auth.openid.providers.<id> is built.
        VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_NAME: authentik
        VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_AUTHURL: "https://auth.${SECRET_DOMAIN}/application/o/vikunja/"
        VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_LOGOUTURL: "https://auth.${SECRET_DOMAIN}/application/o/vikunja/end-session/"
        VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_CLIENTID: "{{ .OAUTH_CLIENT_ID }}"
        VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_CLIENTSECRET: "{{ .OAUTH_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: *app
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secret vikunja-initdb
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: *secret
    creationPolicy: Owner
    template:
      data:
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative_pg
