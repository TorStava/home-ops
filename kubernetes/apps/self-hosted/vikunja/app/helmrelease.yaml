---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vikunja
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17
            envFrom:
              - secretRef:
                  name: *app
              - secretRef:
                  name: vikunja-initdb
        containers:
          app:
            image:
              repository: vikunja/vikunja
              tag: 2.2.2
            env:
              VIKUNJA_DATABASE_TYPE: postgres
              VIKUNJA_DATABASE_HOST: postgres-cluster-rw.database.svc.cluster.local
              VIKUNJA_DATABASE_USER: *app
              VIKUNJA_DATABASE_DATABASE: *app
              VIKUNJA_SERVICE_PUBLICURL: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
              VIKUNJA_SERVICE_ENABLEREGISTRATION: "false"
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3456
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: Vikunja
          gethomepage.dev/icon: vikunja.svg
          gethomepage.dev/app: *app
    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          *app :
            app:
              - path: /app/vikunja/files
