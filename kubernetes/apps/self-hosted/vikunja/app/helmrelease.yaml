---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vikunja
spec:
  timeout: 10m
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom:
              - secretRef:
                  name: *app
              - secretRef:
                  name: vikunja-initdb
        containers:
          app:
            image:
              repository: vikunja/vikunja
              tag: 2.2.2
            env:
              # Image runs as uid 1000; no writable $HOME → Go tries /.cache and fails.
              HOME: /tmp
              VIKUNJA_DATABASE_TYPE: postgres
              VIKUNJA_DATABASE_HOST: postgres-cluster-rw.database.svc.cluster.local
              VIKUNJA_DATABASE_USER: *app
              VIKUNJA_DATABASE_DATABASE: *app
              VIKUNJA_SERVICE_PUBLICURL: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
              VIKUNJA_SERVICE_ENABLEREGISTRATION: "false"
            envFrom:
              - secretRef:
                  name: *app
            probes:
              # app-template defaults probe `/`; Vikunja only serves `/health` (see vikunja pkg/routes).
              liveness: &vikunjaProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 3456
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *vikunjaProbes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 5
                  timeoutSeconds: 3
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3456
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: Vikunja
          gethomepage.dev/icon: vikunja.svg
          gethomepage.dev/app: *app
    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          *app :
            app:
              - path: /app/vikunja/files
