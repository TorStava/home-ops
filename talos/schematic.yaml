customization:
    extraKernelArgs:
        - talos.platform=metal
        - apparmor=0
        - security=none
        - init_on_alloc=0
        - init_on_free=0
        - talos.auditd.disabled=1
        - -selinux
        - cpufreq.default_governor=performance
        - -talos.halt_if_installed
        # Persist last-boot panic/oops in ACPI ERST (HPE bare metal). Requires installer rebuild + talosctl upgrade.
        - pstore.backend=acpi_erst
        - printk.time=1
    systemExtensions:
        officialExtensions:
            - siderolabs/gasket-driver
            - siderolabs/intel-ice-firmware
            - siderolabs/intel-ucode
            - siderolabs/util-linux-tools
            - siderolabs/zfs
